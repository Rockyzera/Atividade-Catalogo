<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Categoria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
    <div class="container">
        <span class="navbar-brand mb-0 h1">Catalogo Fatec</span>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" href="/produtos">Produtos</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="/categorias">Categorias</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link text-warning fw-bold" href="/produtos/auditoria">Auditoria</a>
                </li>
            </ul>
            <div class="d-flex align-items-center">
                <span class="text-light me-3 small">
                    Logado como: <strong sec:authentication="name"></strong>
                </span>
                <form th:action="@{/logout}" method="post" class="m-0">
                    <button type="submit" class="btn btn-outline-danger btn-sm">Sair</button>
                </form>
            </div>
        </div>
    </div>
</nav>

<div class="container">
    <div class="card shadow mx-auto" style="max-width: 500px;">
        <div class="card-header bg-white">
            <h2 class="mb-0" th:text="${categoria.id != null} ? 'Editar Categoria' : 'Nova Categoria'"></h2>
        </div>
        <div class="card-body">
            <form th:action="@{/categorias/salvar}" th:object="${categoria}" method="post">

                <input type="hidden" th:field="*{id}">

                <div class="mb-3">
                    <label class="form-label">Nome da Categoria</label>
                    <input type="text" th:field="*{nome}" class="form-control"
                           th:classappend="${#fields.hasErrors('nome')} ? 'is-invalid'"
                           placeholder="Ex: Eletrônicos">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></div>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-success"
                            onclick="return confirm('Deseja salvar a categoria?')"
                            th:text="${categoria.id != null} ? 'Salvar Alterações' : 'Salvar Categoria'">
                    </button>
                    <a th:href="@{/categorias}" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
