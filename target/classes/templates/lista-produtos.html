<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Catálogo de Produtos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
    <div class="container">
        <span class="navbar-brand mb-0 h1">Catalogo Fatec</span>

        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" href="/produtos">Produtos</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/categorias">Categorias</a>
                </li>
                <!-- PONTO 2: Link para auditoria visível apenas para ADMIN -->
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link text-warning fw-bold" href="/produtos/auditoria">📋 Auditoria</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link text-info fw-bold" href="/cadastro">+ Criar Usuário</a>
                </li>
            </ul>

            <div class="d-flex align-items-center">
                <span class="text-light me-3 small">
                    Logado como: <strong sec:authentication="name"></strong>
                </span>
                <form th:action="@{/logout}" method="post" class="m-0">
                    <button type="submit" class="btn btn-outline-danger btn-sm">Sair</button>
                </form>
            </div>
        </div>
    </div>
</nav>

<div class="container">

    <!-- PONTO 3: Alerta de sucesso com horário da operação -->
    <div th:if="${mensagemSucesso}" class="alert alert-success alert-dismissible fade show" role="alert">
        ✅ <span th:text="${mensagemSucesso}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Fechar"></button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Gestão de Produtos</h2>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/produtos/novo}" class="btn btn-success">
            + Novo Produto
        </a>
    </div>

    <div class="card shadow-sm mb-4">
        <div class="card-body py-3">
            <form th:action="@{/produtos}" method="get" class="d-flex gap-2 mb-0">
                <input type="text"
                       name="nome"
                       class="form-control"
                       placeholder="Pesquisar por nome..."
                       th:value="${nomePesquisado}">

                <select name="categoriaId" class="form-select" style="max-width: 250px;">
                    <option value="">Todas as Categorias</option>
                    <option th:each="cat : ${categorias}"
                            th:value="${cat.id}"
                            th:text="${cat.nome}"
                            th:selected="${categoriaPesquisada == cat.id}">
                    </option>
                </select>

                <button type="submit" class="btn btn-primary px-4">Filtrar</button>
                <a th:href="@{/produtos}" class="btn btn-outline-secondary">Limpar</a>
            </form>
        </div>
    </div>

    <table class="table table-striped table-hover shadow-sm bg-white">
        <thead class="table-dark">
        <tr>
            <th>Nome</th>
            <th>Categoria</th>
            <th>Valor</th>
            <th>Quantidade</th>
            <th>Data de Cadastro</th>
            <!-- PONTO 4: Coluna de ações só aparece para ADMIN -->
            <th sec:authorize="hasRole('ADMIN')" class="text-center">Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${produtos.empty}">
            <td colspan="6" class="text-center text-muted py-4">Nenhum produto encontrado.</td>
        </tr>

        <tr th:each="p : ${produtos}">
            <td th:text="${p.nome}" class="fw-bold align-middle"></td>
            <td th:text="${p.categoria != null ? p.categoria.nome : '-'}" class="align-middle"></td>
            <td th:text="${'R$ ' + p.valor}" class="align-middle"
                th:classappend="${p.valor > 500} ? 'text-danger fw-bold' : ''">
            </td>
            <!-- PONTO 2: Destaque visual para estoque baixo (< 5) -->
            <td class="align-middle fw-bold"
                th:text="${p.quantidade}"
                th:classappend="${p.quantidade != null and p.quantidade < 5} ? 'text-danger' : 'text-success'">
            </td>
            <td th:text="${p.dataCadastro != null ? #temporals.format(p.dataCadastro, 'dd/MM/yyyy HH:mm') : '-'}" class="align-middle text-muted"></td>

            <!-- PONTO 4: Botões de ação visíveis e acessíveis apenas para ADMIN -->
            <td sec:authorize="hasRole('ADMIN')" class="text-center align-middle">
                <a th:href="@{/produtos/editar/{id}(id=${p.idProduto})}" class="btn btn-sm btn-primary">
                    Editar
                </a>
                <a th:href="@{/produtos/deletar/{id}(id=${p.idProduto})}"
                   class="btn btn-sm btn-danger"
                   onclick="return confirm('Deseja realmente excluir este produto?')">
                    Excluir
                </a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
