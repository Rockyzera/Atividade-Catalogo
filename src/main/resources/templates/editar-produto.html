<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Editar Produto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
    <div class="container">
        <span class="navbar-brand mb-0 h1">Catalogo Fatec</span>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" href="/produtos">Produtos</a></li>
                <li class="nav-item"><a class="nav-link" href="/categorias">Categorias</a></li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link text-warning fw-bold" href="/produtos/auditoria">📋 Auditoria</a>
                </li>
            </ul>
            <div class="d-flex align-items-center">
                <span class="text-light me-3 small">
                    Logado como: <strong sec:authentication="name"></strong>
                </span>
                <form th:action="@{/logout}" method="post" class="m-0">
                    <button type="submit" class="btn btn-outline-danger btn-sm">Sair</button>
                </form>
            </div>
        </div>
    </div>
</nav>
<div class="container">
    <div class="card shadow mx-auto" style="max-width: 500px;">
        <div class="card-header text-center bg-white">
            <h2>Editar Produto</h2>
        </div>
        <div class="card-body">
            <form th:action="@{/produtos/editar/{id}(id=${produto.idProduto})}"
                  th:object="${produto}"
                  method="post">

                <div class="mb-3">
                    <label class="form-label">Nome do Produto</label>
                    <input type="text" th:field="*{nome}" class="form-control"
                           th:classappend="${#fields.hasErrors('nome')} ? 'is-invalid'" required>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Preço</label>
                    <input type="number" step="0.01" th:field="*{valor}" class="form-control"
                           th:classappend="${#fields.hasErrors('valor')} ? 'is-invalid'" required>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('valor')}" th:errors="*{valor}"></div>
                </div>

                <!-- PONTO 1: Campo quantidade na edição -->
                <div class="mb-3">
                    <label class="form-label">Quantidade em Estoque</label>
                    <input type="number" th:field="*{quantidade}" class="form-control" min="0"
                           th:classappend="${#fields.hasErrors('quantidade')} ? 'is-invalid'" required>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('quantidade')}" th:errors="*{quantidade}"></div>
                </div>

                <div class="mb-4">
                    <label for="categoriaEditar" class="form-label">Categoria</label>
                    <select id="categoriaEditar" th:field="*{categoria.id}" class="form-select" required>
                        <option value="" disabled>Selecione uma categoria...</option>
                        <option th:each="cat : ${categorias}"
                                th:value="${cat.id}"
                                th:text="${cat.nome}">
                        </option>
                    </select>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary">Salvar Alterações</button>
                    <a href="/produtos" class="btn btn-secondary">Voltar</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
