spring.application.name=catalogo
# URL de conexăo (troque 'db_catalogo' pelo nome que vocę criou no pgAdmin)
spring.datasource.url=jdbc:postgresql://localhost:5432/catalogo
spring.datasource.username=postgres
spring.datasource.password=123456
# Driver e Dialeto
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Hibernate: 'update' cria as tabelas automaticamente se năo existirem
spring.jpa.hibernate.ddl-auto=update

# Opcional: Mostra o SQL no console para vocę ver o que está acontecendo
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
