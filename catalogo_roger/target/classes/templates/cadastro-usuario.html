<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro - Catálogo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .login-container { max-width: 450px; margin-top: 80px; }
    </style>
</head>
<body>

<div class="container login-container">
    <div class="card shadow border-0">
        <div class="card-body p-5">
            <h2 class="text-center mb-4">Criar Conta</h2>

            <form th:action="@{/cadastro}" th:object="${usuario}" method="post">

                <div class="mb-3">
                    <label class="form-label">Nome Completo</label>
                    <input type="text" th:field="*{nome}" class="form-control" required autofocus>
                </div>

                <div class="mb-3">
                    <label class="form-label">Nome de Usuário (Login)</label>
                    <input type="text" th:field="*{username}" class="form-control" required>
                </div>

                <div class="mb-4">
                    <label class="form-label">Senha</label>
                    <input type="password" th:field="*{password}" class="form-control" required>
                </div>

                <div class="mb-4">
                    <label class="form-label">Perfil de Acesso</label>
                    <select th:field="*{role}" class="form-select" required>
                        <option value="" disabled selected>Selecione um perfil...</option>
                        <option value="USER">Usuário Comum (Apenas visualização)</option>
                        <option value="ADMIN">Administrador (Total acesso)</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-success w-100 py-2 mb-3">Cadastrar</button>
            </form>

            <div class="text-center">
                <span class="text-muted small">Já tem uma conta?</span>
                <a th:href="@{/login}" class="text-primary small text-decoration-none fw-bold">Faça login aqui</a>
            </div>

        </div>
    </div>
</div>

</body>
</html>
