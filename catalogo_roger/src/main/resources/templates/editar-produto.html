<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Editar Produto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="card shadow mx-auto" style="max-width: 500px;">
        <div class="card-header text-center">
            <h2>Editar Produto</h2>
        </div>
        <div class="card-body">
            <form th:action="@{/produtos/editar/{id}(id=${produto.idProduto})}"
                  th:object="${produto}"
                  method="post">

                <div class="mb-3">
                    <label class="form-label">Nome do Produto</label>
                    <input type="text" th:field="*{nome}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Preço</label>
                    <input type="number" step="0.01" th:field="*{valor}" class="form-control" required>
                </div>

                <div class="mb-4">
                    <label for="categoriaEditar" class="form-label">Categoria</label>
                    <select id="categoriaEditar" th:field="*{categoria.id}" class="form-select" required>
                        <option value="" disabled>Selecione uma categoria...</option>
                        <option th:each="cat : ${categorias}"
                                th:value="${cat.id}"
                                th:text="${cat.nome}">
                        </option>
                    </select>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary">Salvar Alterações</button>
                    <a href="/produtos" class="btn btn-secondary">Voltar</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
