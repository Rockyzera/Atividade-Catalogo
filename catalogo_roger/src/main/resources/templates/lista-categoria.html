<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Gerenciar Categorias</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
    <div class="container">
        <span class="navbar-brand mb-0 h1">📦 Catálogo Dashboard</span>

        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" href="/produtos">Produtos</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/categorias">Categorias</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link text-info fw-bold" href="/cadastro">+ Criar Usuário</a>
                </li>
            </ul>

            <div class="d-flex align-items-center">
                <span class="text-light me-3 small">
                    Logado como: <strong sec:authentication="name"></strong>
                </span>
                <form th:action="@{/logout}" method="post" class="m-0">
                    <button type="submit" class="btn btn-outline-danger btn-sm">Sair</button>
                </form>
            </div>
        </div>
    </div>
</nav>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Gestão de Categorias</h2>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/categorias/novo}" class="btn btn-success">+ Nova Categoria</a>
    </div>

    <table class="table table-striped table-hover shadow-sm bg-white">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Nome da Categoria</th>
            <th sec:authorize="hasRole('ADMIN')" class="text-center">Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="cat : ${categorias}">
            <td th:text="${cat.id}"></td>
            <td th:text="${cat.nome}" class="fw-bold"></td>

            <td sec:authorize="hasRole('ADMIN')" class="text-center">
                <a th:href="@{/categorias/editar/{id}(id=${cat.id})}" class="btn btn-sm btn-primary">Editar</a>
                <a th:href="@{/categorias/deletar/{id}(id=${cat.id})}" class="btn btn-sm btn-danger"
                   onclick="return confirm('ATENÇÃO: Se essa categoria tiver produtos, o banco não deixará excluir. Tentar excluir?')">Excluir</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
